events {
    worker_connections 8192; # 翻倍并发连接数
    use epoll;
    multi_accept on; # 关键：允许一个 worker 同时接受多个新连接
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # ================= 极速传输优化 (USB/有线专用) =================
    
    # 1. 基础传输
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on; # 极其重要：禁止 Nagle 算法，有数据立刻发，0 延迟
    
    # 2. 连接保持
    # 稍微调小 keepalive，强制 Safari 在空闲时快速重建更健康的连接
    keepalive_timeout 20; 
    keepalive_requests 100;
    
    # 3. 彻底禁用 Nginx 自身的缓冲
    # 我们希望数据直通手机，不要在 Nginx 肚子里逗留
    proxy_buffering off;
    proxy_request_buffering off;
    
    # 4. 关键：重置 TCP 窗口行为
    reset_timedout_connection on;

    upstream fastapi_backend {
        server media-server:8000;
        keepalive 32; # 保持与后端 Python 的长连接
    }

    server {
        listen 80;
        server_name localhost;

        # ================= 视频流处理核心 =================
        location /media/ {
            alias /usr/share/nginx/html/content/;
            
            # --- 策略变更：内存缓存优先 ---
            # 关闭 aio 和 directio。
            # 理由：USB 连接速度极快，让 Linux 操作系统把视频缓存在 RAM 里，
            # 下次播放同一视频或拖拽进度条时，速度是内存级的（纳秒级）。
            aio off;
            directio off; 
            
            # --- 暴力输出缓冲 ---
            # 既然是 USB 有线，带宽管够。
            # 增大缓冲区，让 Nginx 一次性把 2MB 数据塞给网卡
            output_buffers 2 2m; 
            
            # 限制单次系统调用发送的数据量，
            # 避免一个 4K 视频把 Nginx worker 线程卡死，导致点赞点不动
            sendfile_max_chunk 2m;
            
            # --- Safari 核心兼容 ---
            add_header Accept-Ranges bytes;
            add_header Access-Control-Allow-Origin *;
            add_header Cache-Control "no-cache";
            
            # 强制不检查客户端缓存有效性，只要缓存了就直接用
            # 这能极大提升“二次打开”的速度
            expires max;
            add_header Cache-Control "public, no-transform, immutable";
            
            # 关日志省 I/O
            access_log off;
        }

        # ================= API 转发 =================
        location / {
            proxy_pass http://fastapi_backend;
            proxy_http_version 1.1; # 强制使用 HTTP/1.1 长连接
            proxy_set_header Connection ""; # 清除 Connection close 头
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # 即使是 API 也关掉缓冲，让响应更实时
            proxy_buffering off;
        }
    }
}