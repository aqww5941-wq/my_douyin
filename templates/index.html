<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Douyin/X Feed</title>
  <style>
    :root {
      --bg: #000;
      --text: #fff;
      --muted: rgba(255,255,255,0.72);
      --accent: #fe2c55;
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0; width: 100%; height: 100%; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; overflow: hidden;
    }

    .top-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 120;
      display: flex; justify-content: center; gap: 18px;
      padding: calc(var(--safe-top) + 8px) 12px 10px;
      background: linear-gradient(to bottom, rgba(0,0,0,.65), rgba(0,0,0,0));
    }
    .nav-item {
      position: relative; font-size: 17px; font-weight: 600; color: rgba(255,255,255,.58);
      padding: 8px 2px; cursor: pointer;
    }
    .nav-item.active { color: #fff; }
    .nav-item.active::after {
      content: ""; position: absolute; left: 50%; transform: translateX(-50%);
      bottom: 0; width: 20px; height: 3px; background: #fff; border-radius: 2px;
    }

    .swiper-container {
      width: 100%; height: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none;
    }
    .swiper-container::-webkit-scrollbar { display: none; }
    .swiper-slide {
      position: relative; width: 100%; height: 100%; scroll-snap-align: start; overflow: hidden; background: #000;
      display: flex; align-items: center; justify-content: center;
    }
    .swiper-slide::after {
      content: ""; position: absolute; left: 0; right: 0; bottom: 0; height: 48%; z-index: 7;
      background: linear-gradient(to top, rgba(0,0,0,.78), rgba(0,0,0,.35), rgba(0,0,0,0));
      pointer-events: none;
    }
    video, .image-full {
      width: 100%; height: 100%;
    }
    video { object-fit: contain; background: #000; }
    .image-full {
      object-fit: contain;
      background: #000;
    }

    .image-feed {
      width: 100%;
      height: 100%;
      overflow-y: auto;
      padding: calc(var(--safe-top) + 56px) 0 calc(86px + var(--safe-bottom));
      display: none;
      scrollbar-width: none;
      background: linear-gradient(180deg, #0a0a0a 0%, #000 28%);
    }
    .image-feed::-webkit-scrollbar { display: none; }
    .image-card {
      margin: 0 0 2px;
      overflow: hidden;
      background: #000;
    }
    .image-card img {
      display: block;
      width: 100%;
      height: auto;
      object-fit: contain;
      background: #000;
    }

    .meta-panel {
      position: absolute; left: 12px; right: 88px; bottom: calc(90px + var(--safe-bottom)); z-index: 20;
      display: flex; flex-direction: column; gap: 8px;
    }
    .meta-user { font-size: 16px; font-weight: 700; }
    .meta-desc { font-size: 14px; color: #f0f0f0; }

    .side-bar {
      position: absolute; right: 10px; bottom: calc(108px + var(--safe-bottom)); z-index: 22;
      display: flex; flex-direction: column; gap: 16px;
    }
    .btn-group { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .btn-icon {
      width: 46px; height: 46px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(28,28,28,.4);
      display: flex; justify-content: center; align-items: center; font-size: 21px;
      cursor: pointer;
      user-select: none;
    }
    .btn-icon.liked { color: var(--accent); border-color: rgba(254,44,85,.5); }
    .btn-text { font-size: 11px; color: var(--muted); }

    .asmr-mini {
      position: fixed; left: 12px; right: 12px; bottom: calc(62px + var(--safe-bottom)); z-index: 160;
      display: none; align-items: center; gap: 8px;
      border-radius: 999px; padding: 8px 12px;
      background: rgba(20,20,20,.82); border: 1px solid rgba(255,255,255,.12);
      font-size: 12px; color: #fff;
    }
    #asmrTrack {
      flex: 1;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.3);
      color: #fff;
      padding: 4px 10px;
    }
    .asmr-mini button {
      border: none; color: #fff; background: var(--accent); border-radius: 999px; width: 28px; height: 28px; cursor: pointer;
    }

    .bottom-nav {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 140;
      padding: 8px 10px calc(6px + var(--safe-bottom));
      display: flex; justify-content: space-around;
      background: linear-gradient(to top, rgba(0,0,0,.92), rgba(0,0,0,.2));
      border-top: 1px solid rgba(255,255,255,.08);
    }
    .bottom-nav.hidden { display: none; }
    .bottom-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: rgba(255,255,255,.68); font-size: 11px; }
    .bottom-item.active { color: #fff; }
    .bottom-item .icon { font-size: 19px; }
  </style>
</head>
<body>
  <div class="top-nav" id="topNav">
    <div class="nav-item active" data-tab="recommend">推荐</div>
    <div class="nav-item" data-tab="douyin">抖音</div>
    <div class="nav-item" data-tab="tiktok">TikTok</div>
    <div class="nav-item" data-tab="x">x</div>
    <div class="nav-item" data-tab="images">图片</div>
    <div class="nav-item" data-tab="likes">点赞</div>
  </div>

  <div class="swiper-container" id="swiper"></div>
  <div class="image-feed" id="imageFeed"></div>

  <div class="asmr-mini" id="asmrMini">
    <button id="asmrToggle">▶</button>
    <select id="asmrTrack"></select>
  </div>

  <div class="bottom-nav">
    <div class="bottom-item active" data-jump="recommend"><span class="icon">🏠</span><span>首页</span></div>
    <div class="bottom-item" data-jump="likes"><span class="icon">❤️</span><span>点赞</span></div>
  </div>

  <audio id="asmrAudio"></audio>

<script>
const state = {
  currentTab: 'recommend',
  items: [],
  page: 1,
  activeIndex: 0,
  loading: false,
  hasMore: true,
  asmrStarted: false,
  asmrLoaded: false,
  likedSet: new Set()
};

const els = {
  swiper: document.getElementById('swiper'),
  imageFeed: document.getElementById('imageFeed'),
  bottomNav: document.querySelector('.bottom-nav'),
  asmrAudio: document.getElementById('asmrAudio'),
  asmrMini: document.getElementById('asmrMini'),
  asmrToggle: document.getElementById('asmrToggle'),
  asmrTrack: document.getElementById('asmrTrack')
};

function bindTabs() {
  document.querySelectorAll('.nav-item').forEach(item => {
    item.onclick = () => switchTab(item.dataset.tab);
  });
  document.querySelectorAll('.bottom-item').forEach(item => {
    item.onclick = () => switchTab(item.dataset.jump);
  });
}

async function switchTab(tab) {
  const active = document.querySelector('.nav-item.active');
  if (active) active.classList.remove('active');
  const target = document.querySelector(`.nav-item[data-tab="${tab}"]`);
  if (target) target.classList.add('active');

  document.querySelectorAll('.bottom-item').forEach(b => b.classList.remove('active'));
  const bottomTarget = document.querySelector(`.bottom-item[data-jump="${tab === 'likes' ? 'likes' : 'recommend'}"]`);
  if (bottomTarget) bottomTarget.classList.add('active');

  state.currentTab = tab;
  state.activeIndex = 0;
  await loadData(true);
  switchMode();
  if (state.currentTab === 'images') await ensureAsmr();
}

function switchMode() {
  const imageMode = state.currentTab === 'images';
  els.asmrMini.style.display = imageMode ? 'flex' : 'none';
  els.swiper.style.display = imageMode ? 'none' : 'block';
  els.imageFeed.style.display = imageMode ? 'block' : 'none';
  els.bottomNav.classList.toggle('hidden', imageMode);
  if (imageMode) {
    playAsmrIfReady();
  } else {
    els.asmrAudio.pause();
    els.asmrToggle.textContent = '▶';
  }
}

async function loadData(reset = false) {
  if (state.loading) return;
  if (reset) {
    state.items = [];
    state.page = 1;
    state.hasMore = true;
    els.swiper.innerHTML = '';
    els.imageFeed.innerHTML = '';
  }
  if (!state.hasMore) return;

  state.loading = true;
  const size = 10;
  const seed = Math.floor(Date.now() / 1000);
  const useSeed = state.currentTab === 'likes' ? 0 : seed;
  const res = await fetch(`/api/list?tab=${state.currentTab}&page=${state.page}&size=${size}&seed=${useSeed}`);
  const data = await res.json();

  state.items = [...state.items, ...data.items];
  state.hasMore = data.has_more;

  if (state.currentTab === 'images') {
    renderImageFeed(data.items);
  } else {
    renderSlides(data.items);
  }
  if (reset) playCurrent();

  state.page += 1;
  state.loading = false;
}

function renderSlides(items) {
  const base = state.items.length - items.length;
  items.forEach((item, i) => {
    const idx = base + i;
    const filename = item.raw_path.split('/').pop() || 'media';
    const desc = filename.replace(/\.[^/.]+$/, '').replace(/[_-]+/g, ' ').slice(0, 48);
    const liked = state.likedSet.has(item.raw_path);

    const div = document.createElement('div');
    div.className = 'swiper-slide';
    div.dataset.index = idx;
    div.dataset.src = item.src;
    div.dataset.path = item.raw_path;
    div.dataset.type = item.type;

    const mediaHtml = item.type === 'image'
      ? `<img class="image-full" src="${item.src}" alt="img" loading="lazy" decoding="async">`
      : `<video loop playsinline muted preload="none"></video>`;

    div.innerHTML = `
      ${mediaHtml}
      <div class="meta-panel">
        <div class="meta-user">@${state.currentTab}_${(idx % 99) + 1}</div>
        <div class="meta-desc">${desc || '精彩内容持续更新'}</div>
      </div>
      <div class="side-bar">
        <div class="btn-group">
          <div class="btn-icon like-btn ${liked ? 'liked' : ''}" data-path="${item.raw_path}">❤️</div>
          <span class="btn-text">${liked ? '已赞' : '点赞'}</span>
        </div>
      </div>
    `;
    els.swiper.appendChild(div);
    observer.observe(div);
  });
  bindLikeButtons();
}

function renderImageFeed(items) {
  items.forEach((item, i) => {
    const card = document.createElement('div');
    card.className = 'image-card';
    card.dataset.path = item.raw_path;
    card.innerHTML = `
      <img src="${item.src}" alt="img" loading="lazy" decoding="async">
    `;
    els.imageFeed.appendChild(card);
  });
}

function bindLikeButtons() {
  document.querySelectorAll('.like-btn').forEach(btn => {
    if (btn.dataset.bound) return;
    btn.dataset.bound = '1';
    btn.onclick = async (e) => {
      e.stopPropagation();
      const path = btn.dataset.path;
      if (!path) return;
      const liked = state.likedSet.has(path);
      const url = liked ? '/api/unlike' : '/api/like';
      await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ path })
      });

      if (liked) state.likedSet.delete(path);
      else state.likedSet.add(path);

      btn.classList.toggle('liked', !liked);
      const text = btn.parentElement.querySelector('.btn-text');
      if (text) text.textContent = liked ? '点赞' : '已赞';

      if (liked && state.currentTab === 'likes') {
        const slide = btn.closest('.swiper-slide');
        if (slide) slide.remove();
      }
    };
  });
}

function pauseAllVideos() {
  document.querySelectorAll('.swiper-slide video').forEach(v => v.pause());
}

function playCurrent() {
  const slides = document.querySelectorAll('.swiper-slide');
  slides.forEach(slide => {
    const idx = parseInt(slide.dataset.index, 10);
    const video = slide.querySelector('video');
    if (!video) return;
    if (idx === state.activeIndex) {
      if (!video.src) video.src = slide.dataset.src;
      video.muted = false;
      video.play().catch(() => {
        video.muted = true;
        video.play();
      });
    } else {
      video.pause();
      if (Math.abs(idx - state.activeIndex) > 2 && video.src) {
        video.removeAttribute('src');
        video.load();
      }
    }
  });
}

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (!entry.isIntersecting) return;
    const idx = parseInt(entry.target.dataset.index, 10);
    if (idx !== state.activeIndex) {
      state.activeIndex = idx;
      playCurrent();
      if (idx > state.items.length - 4) loadData(false);
    }
  });
}, { root: els.swiper, threshold: 0.6 });

els.imageFeed.addEventListener('scroll', () => {
  const nearBottom = els.imageFeed.scrollTop + els.imageFeed.clientHeight > els.imageFeed.scrollHeight - 500;
  if (nearBottom && state.currentTab === 'images') loadData(false);
}, { passive: true });

async function ensureAsmr() {
  const res = await fetch('/api/asmr/list');
  const data = await res.json();
  const items = data.items || [];
  if (!items.length) {
    els.asmrTrack.innerHTML = '<option value="">暂无 ASMR</option>';
    state.asmrLoaded = false;
    return;
  }

  const current = els.asmrTrack.value;
  els.asmrTrack.innerHTML = items.map((it, i) => {
    const name = (it.raw_path || '').split('/').pop() || `track-${i+1}`;
    return `<option value="${it.src}">${name}</option>`;
  }).join('');
  const match = items.some(it => it.src === current);
  if (match) els.asmrTrack.value = current;
  state.asmrLoaded = true;

  if (!els.asmrTrack.value) els.asmrTrack.selectedIndex = 0;
  if (!state.asmrStarted) {
    els.asmrAudio.src = els.asmrTrack.value;
    els.asmrAudio.loop = true;
    state.asmrStarted = true;
  }
  playAsmrIfReady();
}

function playAsmrIfReady() {
  if (!state.asmrStarted || state.currentTab !== 'images') return;
  els.asmrAudio.play().then(() => {
    els.asmrToggle.textContent = '⏸';
  }).catch(() => {
    els.asmrToggle.textContent = '▶';
  });
}

els.asmrTrack.onchange = () => {
  if (!els.asmrTrack.value) return;
  els.asmrAudio.src = els.asmrTrack.value;
  state.asmrStarted = true;
  if (state.currentTab === 'images') playAsmrIfReady();
};

els.asmrToggle.onclick = () => {
  if (els.asmrAudio.paused) {
    els.asmrAudio.play();
    els.asmrToggle.textContent = '⏸';
  } else {
    els.asmrAudio.pause();
    els.asmrToggle.textContent = '▶';
  }
};

els.swiper.addEventListener('scroll', () => {
  const nearBottom = els.swiper.scrollTop + els.swiper.clientHeight > els.swiper.scrollHeight - 500;
  if (nearBottom) loadData(false);
}, { passive: true });

async function initLikedSet() {
  const res = await fetch('/api/list?tab=likes&page=1&size=10000&seed=0');
  const data = await res.json();
  (data.items || []).forEach(it => state.likedSet.add(it.raw_path));
}

async function init() {
  bindTabs();
  await initLikedSet();
  await loadData(true);
  switchMode();
}

init();
</script>
</body>
</html>
