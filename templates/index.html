<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Media Browser Pro</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; color:#fff; font-family:-apple-system,BlinkMacSystemFont,sans-serif; overflow:hidden; height:100dvh; user-select:none; -webkit-user-select:none; }
#app { height:100%; width:100%; position:relative; }
#feed-container { height:calc(100% - 50px); width:100%; overflow-y:scroll; scroll-snap-type:y mandatory; scroll-behavior:smooth; -webkit-overflow-scrolling:touch; }
#feed-container::-webkit-scrollbar { display:none; }
.media-item { height:100%; width:100%; scroll-snap-align:start; scroll-snap-stop:always; position:relative; display:flex; justify-content:center; align-items:center; background:#000; overflow:hidden; }
video,img { width:100%; height:100%; object-fit:contain; }
.navbar { position:absolute; bottom:0; width:100%; height:50px; background:rgba(0,0,0,0.9); display:flex; justify-content:space-around; align-items:center; border-top:1px solid #333; z-index:100; padding-bottom:env(safe-area-inset-bottom); }
.nav-item { color:#888; font-size:14px; font-weight:bold; cursor:pointer; padding:10px; transition:.2s; }
.nav-item.active { color:#fff; position:relative; transform:scale(1.1); }
.nav-item.active::after { content:''; position:absolute; bottom:5px; left:50%; transform:translateX(-50%); width:16px; height:2px; background:#fff; }
#music-btn { position:fixed; top:20px; right:20px; z-index:200; width:44px; height:44px; background:rgba(0,0,0,0.5); border-radius:50%; display:none; align-items:center; justify-content:center; border:1px solid rgba(255,255,255,0.3); font-size:20px; }
#debug-info { position:fixed; top:20px; left:20px; z-index:200; background:rgba(0,0,0,0.7); padding:8px 12px; border-radius:8px; font-size:12px; display:none; }
.rotating { animation:rotate 3s linear infinite; }
@keyframes rotate { from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
.like-heart { position:fixed; width:90px; height:90px; background:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23fe2c55"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>') no-repeat center; background-size:contain; z-index:1000; pointer-events:none; animation:heart-pop .6s ease-out forwards; }
@keyframes heart-pop {0%{transform:scale(0) rotate(-15deg);opacity:0;}50%{transform:scale(1.3) rotate(10deg);opacity:1;}100%{transform:scale(1) translateY(-60px);opacity:0;}}
.progress-touch-area { position:absolute; bottom:0; left:0; width:100%; height:15px; z-index:90; display:flex; align-items:flex-end; cursor:pointer; }
.progress-bg { width:100%; height:2px; background:rgba(255,255,255,0.2); position:relative; }
.progress-fill { height:100%; width:0%; background:#fe2c55; }
.modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:300; display:none; justify-content:center; align-items:center; backdrop-filter:blur(4px);}
.modal-box { background:#1e1e1e; width:280px; border-radius:12px; padding:20px; text-align:center; }
.modal-btn { width:100%; padding:12px; margin-top:10px; border-radius:6px; border:none; font-weight:bold; cursor:pointer; }
.btn-confirm { background:#fe2c55; color:#fff; }
.btn-cancel { background:#333; color:#fff; }
.loading-indicator { position:fixed; bottom:60px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.7); padding:8px 16px; border-radius:20px; font-size:12px; display:none; z-index:150; }
</style>
</head>
<body>
<div id="app">
    <div id="debug-info"></div>
    <div id="music-btn" onclick="toggleMusic()">🎵</div>
    <audio id="bg-audio" loop></audio>
    <div id="feed-container"></div>
    <div class="loading-indicator" id="loadingIndicator">加载中...</div>
    <div class="navbar">
        <div class="nav-item active" onclick="switchTab('recommend')">推荐</div>
        <div class="nav-item" onclick="switchTab('x')">X视频</div>
        <div class="nav-item" onclick="switchTab('douyin')">抖音</div>
        <div class="nav-item" onclick="switchTab('images')">图片</div>
        <div class="nav-item" onclick="switchTab('likes')">喜欢</div>
    </div>
</div>

<div class="modal-overlay" id="deleteModal">
    <div class="modal-box">
        <div style="font-weight:bold; margin-bottom:10px;">彻底删除文件？</div>
        <button class="modal-btn btn-confirm" onclick="confirmDelete()">确定删除</button>
        <button class="modal-btn btn-cancel" onclick="closeModal()">取消</button>
    </div>
</div>

<script>
// 配置
let currentTab = 'recommend';
let currentPage = 1;
const PAGE_SIZE = 30; // 每页加载30条
let hasMore = true;
let isLoading = false;
let sessionSeed = Date.now();
let lastClickTime = 0;
let currentItemToDelete = null;
let globalUnmuted = false;
let loadedItems = 0;
let totalItems = 0;

// DOM元素
const container = document.getElementById('feed-container');
const bgAudio = document.getElementById('bg-audio');
const musicBtn = document.getElementById('music-btn');
const debugInfo = document.getElementById('debug-info');
const loadingIndicator = document.getElementById('loadingIndicator');

// 调试模式（在URL中添加 ?debug=1 开启）
const urlParams = new URLSearchParams(window.location.search);
const debugMode = urlParams.get('debug') === '1';

if (debugMode) {
    debugInfo.style.display = 'block';
    updateDebugInfo();
}

// 滚动加载
let scrollTimeout = null;
container.addEventListener('scroll', () => {
    if (scrollTimeout) clearTimeout(scrollTimeout);
    scrollTimeout = setTimeout(() => {
        // 滚动到底部时加载更多
        const scrollBottom = container.scrollHeight - container.scrollTop - container.clientHeight;
        if (scrollBottom < 300 && !isLoading && hasMore) {
            loadData();
        }
    }, 100);
});

// IntersectionObserver 用于视频播放控制
const videoObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        const vid = entry.target.querySelector('video');
        if (!vid) return;
        
        if (entry.isIntersecting) {
            vid.muted = !globalUnmuted;
            vid.play().catch(e => {
                console.log('视频播放失败:', e);
            });
        } else {
            vid.pause();
            // 不要重置时间，这样用户滚动回来可以继续播放
            // vid.currentTime = 0;
        }
    });
}, { threshold: 0.6 });

// 加载数据
async function loadData() {
    if (isLoading || !hasMore) return;
    
    isLoading = true;
    showLoading(true);
    
    try {
        console.log(`正在加载: Tab=${currentTab}, Page=${currentPage}, Size=${PAGE_SIZE}`);
        
        const url = `/api/list?tab=${currentTab}&page=${currentPage}&size=${PAGE_SIZE}&seed=${sessionSeed}`;
        const res = await fetch(url);
        const data = await res.json();
        
        console.log(`加载完成: 第${currentPage}页，获取到${data.items.length}条数据，总共${data.total}条`);
        
        if (data.items.length > 0) {
            renderItems(data.items);
            currentPage++;
            hasMore = data.has_more;
            loadedItems += data.items.length;
            totalItems = data.total || 0;
            
            if (debugMode) {
                updateDebugInfo();
            }
        } else {
            hasMore = false;
            console.log('没有更多数据了');
        }
    } catch (e) {
        console.error('加载数据失败:', e);
        hasMore = false;
    } finally {
        isLoading = false;
        showLoading(false);
    }
}

// 渲染项目
function renderItems(items) {
    items.forEach(item => {
        const div = document.createElement('div');
        div.className = 'media-item';
        div.dataset.rawPath = item.raw_path;
        div.dataset.type = item.type;

        if (item.type === 'video') {
            div.innerHTML = `
                <video src="${item.src}" loop playsinline muted preload="metadata"></video>
                <div class="progress-touch-area">
                    <div class="progress-bg">
                        <div class="progress-fill"></div>
                    </div>
                </div>
            `;
        } else {
            div.innerHTML = `<img src="${item.src}" loading="lazy" alt="图片" />`;
        }
        
        bindEvents(div, item.type);
        container.appendChild(div);
        videoObserver.observe(div);
    });
}

// 绑定事件
function bindEvents(el, type) {
    const video = el.querySelector('video');
    let pressTimer;
    let isLongPress = false;

    // 视频进度条
    if (video) {
        video.addEventListener('timeupdate', () => {
            const fill = el.querySelector('.progress-fill');
            if (fill && video.duration && !isNaN(video.duration)) {
                fill.style.width = (video.currentTime / video.duration * 100) + '%';
            }
        });
        
        // 点击切换静音/播放
        el.addEventListener('click', (e) => {
            const now = Date.now();
            
            // 双击点赞
            if (now - lastClickTime < 300) {
                handleDoubleTap(e, el);
                lastClickTime = 0; // 重置
                return;
            }
            
            lastClickTime = now;
            
            // 单击切换静音/播放
            if (video.paused) {
                video.play().catch(() => {});
            } else {
                video.muted = !video.muted;
                globalUnmuted = !video.muted;
                updateAllVideosMuteState();
            }
        });
    } else {
        // 图片点击事件
        el.addEventListener('click', (e) => {
            const now = Date.now();
            
            // 双击点赞
            if (now - lastClickTime < 300) {
                handleDoubleTap(e, el);
                lastClickTime = 0;
                return;
            }
            
            lastClickTime = now;
        });
    }

    // 长按删除
    el.addEventListener('touchstart', () => {
        pressTimer = setTimeout(() => {
            isLongPress = true;
            currentItemToDelete = el;
            document.getElementById('deleteModal').style.display = 'flex';
        }, 700);
    });

    el.addEventListener('touchend', () => {
        clearTimeout(pressTimer);
    });
    
    el.addEventListener('touchmove', () => {
        clearTimeout(pressTimer);
    });
}

// 更新所有视频静音状态
function updateAllVideosMuteState() {
    document.querySelectorAll('video').forEach(v => {
        v.muted = !globalUnmuted;
    });
}

// 双击点赞
async function handleDoubleTap(e, el) {
    if (el.dataset.isLiking === "true") return;
    
    el.dataset.isLiking = "true";
    
    // 显示爱心动画
    const heart = document.createElement('div');
    heart.className = 'like-heart';
    heart.style.left = (e.clientX - 45) + 'px';
    heart.style.top = (e.clientY - 45) + 'px';
    document.body.appendChild(heart);
    
    // 发送点赞请求
    try {
        await fetch('/api/like', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ path: el.dataset.rawPath })
        });
        console.log('点赞成功:', el.dataset.rawPath);
    } catch (error) {
        console.error('点赞失败:', error);
    }
    
    // 移除爱心
    setTimeout(() => {
        heart.remove();
        el.dataset.isLiking = "false";
    }, 600);
}

// 切换标签页
function switchTab(tab) {
    if (currentTab === tab) return;
    
    currentTab = tab;
    currentPage = 1;
    hasMore = true;
    isLoading = false;
    loadedItems = 0;
    totalItems = 0;
    sessionSeed = Date.now();
    
    // 清空容器并停止观察所有元素
    const items = document.querySelectorAll('.media-item');
    items.forEach(item => {
        videoObserver.unobserve(item);
    });
    container.innerHTML = '';
    
    // 更新导航栏
    document.querySelectorAll('.nav-item').forEach(item => {
        item.classList.remove('active');
    });
    event.target.classList.add('active');
    
    // 背景音乐控制
    if (tab === 'images') {
        musicBtn.style.display = 'flex';
        startRandomBgm();
    } else {
        musicBtn.style.display = 'none';
        bgAudio.pause();
        musicBtn.classList.remove('rotating');
    }
    
    // 加载数据
    loadData();
    
    // 滚动到顶部
    container.scrollTop = 0;
}

// 随机播放背景音乐
async function startRandomBgm() {
    try {
        const res = await fetch('/api/list?tab=recommend&size=50');
        const data = await res.json();
        const vids = data.items.filter(i => i.type === 'video');
        
        if (vids.length > 0) {
            const randomVideo = vids[Math.floor(Math.random() * vids.length)];
            bgAudio.src = randomVideo.src;
            
            // 尝试播放，如果失败等待用户交互
            bgAudio.play().then(() => {
                musicBtn.classList.add('rotating');
            }).catch(() => {
                console.log("背景音乐等待用户交互");
            });
        }
    } catch (e) {
        console.error('加载背景音乐失败:', e);
    }
}

// 切换音乐播放/暂停
function toggleMusic() {
    if (bgAudio.paused) {
        bgAudio.play().then(() => {
            musicBtn.classList.add('rotating');
        });
    } else {
        bgAudio.pause();
        musicBtn.classList.remove('rotating');
    }
}

// 显示/隐藏加载指示器
function showLoading(show) {
    if (show) {
        loadingIndicator.style.display = 'block';
        loadingIndicator.textContent = '加载中...';
    } else {
        setTimeout(() => {
            loadingIndicator.style.display = 'none';
        }, 300);
    }
}

// 更新调试信息
function updateDebugInfo() {
    if (!debugMode) return;
    
    debugInfo.innerHTML = `
        Tab: ${currentTab} | 
        页码: ${currentPage} | 
        已加载: ${loadedItems} | 
        总计: ${totalItems} | 
        有更多: ${hasMore}
    `;
}

// 关闭模态框
function closeModal() {
    document.getElementById('deleteModal').style.display = 'none';
}

// 确认删除
async function confirmDelete() {
    if (!currentItemToDelete) return;
    
    const path = currentItemToDelete.dataset.rawPath;
    
    try {
        const res = await fetch('/api/delete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ path: path })
        });
        
        const data = await res.json();
        
        if (data.status === 'success') {
            // 从DOM中移除
            currentItemToDelete.remove();
            loadedItems--;
            if (debugMode) updateDebugInfo();
            console.log('删除成功:', path);
        } else {
            console.error('删除失败:', data.message);
            alert('删除失败: ' + data.message);
        }
    } catch (error) {
        console.error('删除请求失败:', error);
        alert('删除请求失败');
    }
    
    closeModal();
}

// 手动重新扫描文件（调试用）
async function rescanFiles() {
    try {
        const res = await fetch('/api/rescan');
        const data = await res.json();
        console.log('重新扫描结果:', data);
        alert(`重新扫描完成！\n视频: ${data.counts.all_videos}\n图片: ${data.counts.all_images}`);
        
        // 刷新当前页面
        switchTab(currentTab);
    } catch (error) {
        console.error('重新扫描失败:', error);
    }
}

// 页面加载完成
window.onload = () => {
    console.log('Media Browser Pro 启动');
    
    // 激活第一个tab
    document.querySelector('.nav-item').classList.add('active');
    
    // 初始加载
    loadData();
    
    // 添加重新扫描按钮（调试用）
    if (debugMode) {
        const rescanBtn = document.createElement('button');
        rescanBtn.textContent = '重新扫描';
        rescanBtn.style.position = 'fixed';
        rescanBtn.style.top = '60px';
        rescanBtn.style.right = '20px';
        rescanBtn.style.zIndex = '200';
        rescanBtn.style.padding = '8px 12px';
        rescanBtn.style.background = '#fe2c55';
        rescanBtn.style.color = '#fff';
        rescanBtn.style.border = 'none';
        rescanBtn.style.borderRadius = '6px';
        rescanBtn.style.cursor = 'pointer';
        rescanBtn.onclick = rescanFiles;
        document.body.appendChild(rescanBtn);
    }
};
</script>
</body>
</html>
